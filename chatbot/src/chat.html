<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>n8n AI Workflow Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #ffffff;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 14px 16px 12px;
      background: #ff6d5a;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header-title { font-weight: 600; font-size: 15px; }
    .header-sub  { font-size: 11px; opacity: 0.8; }
    .header-spacer { flex: 1; }
    #clear-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #clear-btn:hover { background: rgba(255,255,255,0.28); }

    /* Messages area */
    #messages {
      flex: 1;
      min-height: 0; /* critical: lets this column shrink so .input-area stays visible (flex + overflow) */
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }

    .bubble {
      max-width: 88%;
      padding: 10px 13px;
      border-radius: 14px;
      line-height: 1.5;
      word-break: break-word;
      font-size: 13.5px;
    }
    .bubble.user {
      align-self: flex-end;
      background: #ff6d5a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      align-self: flex-start;
      background: #f3f4f6;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .bubble.bot.error {
      background: #fff0ee;
      color: #c0392b;
    }
    .bubble.bot a {
      color: #ff6d5a;
      font-weight: 600;
      text-decoration: none;
    }
    .bubble.bot a:hover { text-decoration: underline; }

    /* Typing indicator */
    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 14px;
      align-self: flex-start;
    }
    .typing span {
      width: 7px; height: 7px;
      background: #ccc; border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
      40%            { opacity: 1;   transform: scale(1.1); }
    }

    /* Workflow JSON preview */
    .workflow-preview {
      margin-top: 8px;
      background: #1a1a2e;
      color: #a8ff78;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 11px;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre;
    }

    /* Input area */
    .input-area {
      padding: 12px 12px 14px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    #input {
      flex: 1;
      resize: none;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13.5px;
      font-family: inherit;
      line-height: 1.45;
      max-height: 100px;
      outline: none;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: #ff6d5a; }
    #send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: #ff6d5a;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: #e85d4a; }
    #send-btn:disabled { background: #f0a899; cursor: not-allowed; }
    #send-btn svg { pointer-events: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">⚡</div>
    <div>
      <div class="header-title">AI Workflow Generator</div>
      <div class="header-sub">意圖分解 → insert / modify / delete agents → 寫回 n8n</div>
    </div>
    <div class="header-spacer"></div>
    <button id="clear-btn" title="清空對話">清空</button>
  </div>

  <div id="messages">
    <div class="bubble bot">
      👋 在此描述要對 **目前開啟的 workflow** 做的變更（會自動從網址帶入 workflow id）。<br><br>
      範例：<em>「把 Slack 節點改成發到 #general」</em>、<em>「在 HTTP Request 後面加一個 Set」</em>、<em>「刪掉用不到的 Code 節點」</em><br><br>
      <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;cursor:pointer;">
        <input type="checkbox" id="quick-mode" />
        快速模式（只做從零生成，不跑意圖分解與編輯 agents）
      </label>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="描述你想要的 workflow…"></textarea>
    <button type="button" id="send-btn" title="送出">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script>
    var AGENT_URL = 'http://localhost:3001/agent/run';
    var GENERATE_URL = 'http://localhost:3001/generate';
    var HISTORY_KEY = 'n8n-widget-history';
    var SESSION_KEY = 'n8n-widget-agent-session';

    var messagesEl = document.getElementById('messages');
    var inputEl    = document.getElementById('input');
    var sendBtn    = document.getElementById('send-btn');
    var clearBtn   = document.getElementById('clear-btn');

    function currentWorkflowId() {
      var q = new URLSearchParams(window.location.search || '');
      var w = q.get('workflowId');
      return w && String(w).trim() ? String(w).trim() : null;
    }

    function loadSessionId() {
      try { return localStorage.getItem(SESSION_KEY) || null; } catch (e) { return null; }
    }
    function saveSessionId(id) {
      if (!id) return;
      try { localStorage.setItem(SESSION_KEY, id); } catch (e) {}
    }

    // -----------------------------------------------------------------
    // Chat history persistence via sessionStorage
    // -----------------------------------------------------------------
    var chatHistory = [];

    function saveHistory() {
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(chatHistory)); } catch(e) {}
    }

    function restoreHistory() {
      try {
        var saved = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        if (!Array.isArray(saved) || saved.length === 0) return;
        // Remove the default greeting before restoring
        messagesEl.innerHTML = '';
        saved.forEach(function(item) {
          addBubble(item.html, item.type, true); // true = skip saving again
        });
        chatHistory = saved;
      } catch(e) {}
    }

    // -----------------------------------------------------------------

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addBubble(html, type, skipSave) {
      var el = document.createElement('div');
      el.className = 'bubble ' + type;
      el.innerHTML = html;
      messagesEl.appendChild(el);
      scrollBottom();
      if (!skipSave) {
        chatHistory.push({ html: html, type: type });
        saveHistory();
      }
      return el;
    }

    function addTyping() {
      var el = document.createElement('div');
      el.className = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(el);
      scrollBottom();
      return el;
    }

    // Auto-grow textarea
    inputEl.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    async function send() {
      var text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addBubble(escHtml(text), 'user');

      var typing = addTyping();

      try {
        var qm = document.getElementById('quick-mode');
        var useQuick = qm && qm.checked;
        var wfId = useQuick ? null : currentWorkflowId();
        var body = useQuick
          ? { message: text }
          : {
              message: text,
              sessionId: loadSessionId(),
              workflowId: wfId,
              clearSession: false,
            };
        var url = useQuick ? GENERATE_URL : AGENT_URL;
        var res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        var data = await res.json();
        typing.remove();

        if (!res.ok || data.error) {
          var errMsg = data.error || 'Unknown error';
          if (data.sessionId) saveSessionId(data.sessionId);
          var errHtml = '❌ ' + escHtml(errMsg);
          if (data.workflow) {
            errHtml += '<div class="workflow-preview">' + escHtml(JSON.stringify(data.workflow, null, 2)) + '</div>';
          }
          addBubble(errHtml, 'bot error');
        } else if (data.action === 'clarify') {
          var cands = data.candidates && data.candidates.length
            ? '<br><br>候選：<em>' + escHtml(data.candidates.join(', ')) + '</em>'
            : '';
          saveSessionId(data.sessionId);
          addBubble('❓ ' + escHtml(data.message || '') + cands, 'bot');
        } else if (data.action === 'done') {
          saveSessionId(null);
          try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
          var html = '✅ ' + escHtml(data.message || '完成');
          if (data.workflowUrl) {
            html += '<br><br><a href="' + escHtml(data.workflowUrl) + '" target="_parent">→ 在 n8n 中開啟 workflow</a>';
          }
          if (data.workflow) {
            html += '<div class="workflow-preview">' + escHtml(JSON.stringify(data.workflow, null, 2)) + '</div>';
          }
          addBubble(html, 'bot');
        } else if (useQuick) {
          var htmlQ = '✅ ' + escHtml(data.message || '');
          if (data.workflowUrl) {
            htmlQ += '<br><br><a href="' + escHtml(data.workflowUrl) + '" target="_parent">→ 在 n8n 中開啟 workflow</a>';
          }
          if (data.workflow) {
            htmlQ += '<div class="workflow-preview">' + escHtml(JSON.stringify(data.workflow, null, 2)) + '</div>';
          }
          addBubble(htmlQ, 'bot');
        } else {
          saveSessionId(data.sessionId);
          var html2 = '✅ ' + escHtml(data.message || '已處理');
          if (data.workflowUrl) {
            html2 += '<br><br><a href="' + escHtml(data.workflowUrl) + '" target="_parent">→ 在 n8n 中開啟 workflow</a>';
          }
          if (data.workflow) {
            html2 += '<div class="workflow-preview">' + escHtml(JSON.stringify(data.workflow, null, 2)) + '</div>';
          }
          addBubble(html2, 'bot');
        }
      } catch (err) {
        typing.remove();
        addBubble('❌ 無法連線到 chatbot 服務：' + escHtml(err.message), 'bot error');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    sendBtn.addEventListener('click', send);

    clearBtn.addEventListener('click', function () {
      chatHistory = [];
      try { localStorage.removeItem(HISTORY_KEY); } catch (e) {}
      try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
      messagesEl.innerHTML =
        '<div class="bubble bot">👋 在此描述要對 <strong>目前開啟的 workflow</strong> 做的變更（會自動從網址帶入 workflow id）。<br><br>範例：<em>「把 Slack 節點改成發到 #general」</em>、<em>「在 HTTP Request 後面加一個 Set」</em>、<em>「刪掉用不到的 Code 節點」</em><br><br><label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;cursor:pointer;"><input type="checkbox" id="quick-mode" />快速模式（只做從零生成，不跑意圖分解與編輯 agents）</label></div>';
    });

    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // Restore history on load (survives iframe recreation)
    restoreHistory();
  </script>
</body>
</html>
